<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>走丢了!</title>
    <script>
        function redirect() {
            var seconds = 5;
            var interval = setInterval(function() {
                seconds--;
                document.getElementById("countdown").innerText = "将在 " + seconds + " 秒后跳转到主页";
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = "https://blog.tanzong.us.kg";
                }
            }, 1000);
        }
    </script>
</head>

<body onload="redirect()">
    <h3>404 Not Found.</h3>
    <p id="countdown">将在 5 秒后跳转到主页</p>
</body>

</html>
